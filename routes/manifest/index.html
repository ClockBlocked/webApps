      <h2 class="faq-title">FAQ.</h2>
      <p class="faq-subtitle">Common manifest questions answered.</p>
    </div>
    <div class="faq-list" id="faq-list">
      <div class="capability-grid" style="margin-top: 2rem;">
        <div class="capability-card">
          <h4 class="capability-card-title">Where does the manifest file go?</h4>
          <p class="capability-card-text">Place manifest.json at the root of your web server. Reference it with &lt;link rel="manifest" href="/manifest.json"&gt; inside your HTML &lt;head&gt;.</p>
        </div>
        <div class="capability-card">
          <h4 class="capability-card-title">Does every page need the link tag?</h4>
          <p class="capability-card-text">Yes. Every HTML page should have the &lt;link rel="manifest"&gt; tag so the browser can discover the manifest regardless of which page the user lands on.</p>
        </div>
        <div class="capability-card">
          <h4 class="capability-card-title">Why isn't my app installable?</h4>
          <p class="capability-card-text">Check DevTools → Application → Manifest for errors. Common causes: missing icons (192/512), no service worker, not served over HTTPS, or invalid JSON syntax.</p>
        </div>
        <div class="capability-card">
          <h4 class="capability-card-title">Can I update the manifest after install?</h4>
          <p class="capability-card-text">Yes. Changes to manifest.json take effect when the browser refreshes the manifest, typically within 24 hours or when the service worker updates.</p>
        </div>
      </div>
    </div>
    <div class="faq-contact">
      <h3 class="faq-contact-heading">Next step: add a service worker for offline support.</h3>
    </div>
  </div>
</section>
